# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
# docs: https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions

name: dir-listing

on:
  push:
    branches: main
    tags-ignore: ['**']
  workflow_dispatch: {}

concurrency:
  group: ${{ github.ref }}-deploy
  cancel-in-progress: true

env: {FORCE_COLOR: 'true'}

jobs:
  demo:
    name: Generate files and update the demo (GitHub Pages)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Run this action
        uses: ./
        with:
          target: .
          ignore: '**/generator.js'
          show-hidden: true
          overwrite: false
      - run: find . -type f -name index.html -exec ls -l "{}" \;
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          exclude_assets: '.github,dist,action.yaml,README.md'
          publish_dir: .
          publish_branch: release

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: demo
    permissions:
      pages: write # Grants the GITHUB_TOKEN write permissions for Pages
      id-token: write # Permits the use of OpenID Connect (OIDC) tokens
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4 # The official GitHub Pages deployment action
