<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
</head>	
  <body>
    <script>
		let baseurl = 'https://api.github.ibm.com/repos/boyitzen/boyitzen.github.io/contents';
		//let tokenurl = '?access_token=d87e4de21c3ef20fc1e0d6f3ad2e66440c2bc5b3';
	    	let tokenurl = '?access_token=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';
		var htmlString = '<ul>';
		const urlParams = new URLSearchParams(window.location.search);
		const dir = urlParams.get('dir');
		var requrl = baseurl + tokenurl;
		if (dir){
			requrl = baseurl + '/' + dir + tokenurl;
		}
      (async () => {
        const response = await fetch(requrl);
        //const response = await fetch('https://api.github.ibm.com/repos/boyitzen/boyitzen.github.io/contents/',
		//{method:'GET', headers: {'Authorization': 'Basic ' + btoa('boyitzen:d87e4de21c3ef20fc1e0d6f3ad2e66440c2bc5b3')}}
		//);		
        const data = await response.json();
        let htmlString = '<pre>';
        for (let file of data) {
			if (file.type == "dir"){
			  url_filename = file.path.replaceAll(' ', '%20');
			  url_filename = url_filename.replace(/[&]/g,"%26");
			  htmlString += `<div><img style="vertical-align:middle" src="icons/folder.jpg" width="35" height="35">&nbsp<a href="?dir=${url_filename}"><span style="">${file.name}</span></a></div>`;	
			} else {
			  if (file.name.endsWith('html')){
				htmlString += `<div><img style="vertical-align:middle" src="icons/html.jpg" width="35" height="35">&nbsp<a href="${file.path}"><span style="">${file.name}</span></a></div>`;		
			  } else {
				htmlString += `<div><img style="vertical-align:middle" src="icons/file.jpg" width="35" height="35">&nbsp<a href="${file.path}"><span style="">${file.name}</span></a></div>`;
			  }
			}
        }
        htmlString += '</pre>';
        document.getElementsByTagName('body')[0].innerHTML = htmlString;
      })()
    </script>
  <body>
</html>
